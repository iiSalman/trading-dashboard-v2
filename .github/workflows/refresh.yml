name: Refresh market snapshot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'analyzer.py'
      - 'tools/build_snapshot.py'
      - 'requirements.txt'
      - '.github/workflows/refresh.yml'

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build snapshot
        run: python tools/build_snapshot.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/snapshot.json
          if git diff --cached --quiet; then
            echo "No change in snapshot — skipping commit"
          else
            git commit -m "Refresh snapshot $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push
          fi
