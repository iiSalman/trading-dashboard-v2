name: Refresh market snapshot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'analyzer.py'
      - 'tools/build_snapshot.py'
      - 'requirements.txt'
      - '.github/workflows/refresh.yml'

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build snapshot
        run: python tools/build_snapshot.py

      - name: Commit & push if changed
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/snapshot.json
          if git diff --cached --quiet; then
            echo "No change in snapshot — skipping commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Refresh snapshot $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            if git push origin main; then
              echo "pushed on attempt $i"
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "push attempt $i failed (likely raced another run); retrying"
            sleep $((3 * i))
          done
          echo "exhausted push retries"
          exit 1

